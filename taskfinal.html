<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      padding: 15px;
      background: #333;
      color: white;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input, select, button {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }

    .price {
      background: green;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      margin-top: 5px;
      display: inline-block;
    }

    #loader {
      text-align: center;
      font-size: 20px;
      margin-top: 20px;
    }

    #error {
      color: red;
      text-align: center;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>
<body>

<header>🛒 Product Dashboard</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search product..." />
  
  <select id="category">
    <option value="">All Categories</option>
    <option value="electronics">Electronics</option>
    <option value="jewelery">Jewelery</option>
    <option value="men's clothing">Men</option>
    <option value="women's clothing">Women</option>
  </select>

  <button onclick="sortLow()">Low → High</button>
  <button onclick="sortHigh()">High → Low</button>
</div>

<div id="loader">Loading...</div>
<div id="error"></div>

<div class="container" id="products"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="mTitle"></h3>
    <p id="mDesc"></p>
    <p id="mPrice"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  let allProducts = [];
  let filtered = [];

  const container = document.getElementById("products");
  const loader = document.getElementById("loader");
  const error = document.getElementById("error");

  async function fetchData() {
    try {
      const res = await fetch("https://fakestoreapi.com/products");
      const data = await res.json();
      allProducts = data;
      filtered = data;
      loader.style.display = "none";
      displayProducts(filtered);
    } catch {
      loader.style.display = "none";
      error.innerText = "Error loading data";
    }
  }

  function displayProducts(products) {
    container.innerHTML = "";
    products.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${p.image}" />
        <h4>${p.title.substring(0, 20)}</h4>
        <p>${p.description.substring(0, 60)}...</p>
        <div class="price">₹ ${p.price}</div><br/>
        <button onclick='viewDetails(${JSON.stringify(p)})'>View More</button>
      `;

      container.appendChild(card);
    });
  }

  // Search
  document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    filtered = allProducts.filter(p =>
      p.title.toLowerCase().includes(val)
    );
    displayProducts(filtered);
  });

  // Category Filter
  document.getElementById("category").addEventListener("change", e => {
    const val = e.target.value;
    filtered = val
      ? allProducts.filter(p => p.category === val)
      : allProducts;
    displayProducts(filtered);
  });

  // Sorting
  function sortLow() {
    filtered.sort((a, b) => a.price - b.price);
    displayProducts(filtered);
  }

  function sortHigh() {
    filtered.sort((a, b) => b.price - a.price);
    displayProducts(filtered);
  }

  // Modal
  function viewDetails(p) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("mTitle").innerText = p.title;
    document.getElementById("mDesc").innerText = p.description;
    document.getElementById("mPrice").innerText = "₹ " + p.price;
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  fetchData();
</script>

</body>
</html>
