<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Tasks Output</title>
</head>
<body>

<h2>Open Console to See Output</h2>

<script>
// =======================
// 🚀 Task 1: Cart System
// =======================
let cart = [
  {name: "Shirt", price: 500, qty: 2},
  {name: "Shoes", price: 1500, qty: 1},
  {name: "Cap", price: 300, qty: 3}
];

// Total price
let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
console.log("Total Price:", total);

// Products above 1000
let costly = cart.filter(item => item.price > 1000);
console.log("Above 1000:", costly);

// Uppercase names
let names = cart.map(item => item.name.toUpperCase());
console.log("Uppercase Names:", names);


// =======================
// 🚀 Task 2: Students
// =======================
let students = [
  {name: "siva", marks: 85},
  {name: "saran", marks: 45},
  {name: "thiru", marks: 60},
  {name: "sampath", marks: 30}
];

// Failed students
let failed = students.filter(s => s.marks < 50);
console.log("Failed Students:", failed);

// Any distinction
console.log("Any Distinction:", students.some(s => s.marks > 80));

// All passed
console.log("All Passed:", students.every(s => s.marks > 35));

// First failed
console.log("First Failed:", students.find(s => s.marks < 50));


// =======================
// 🚀 Task 3: Employees
// =======================
let employees = [
  {name: "A", salary: 25000},
  {name: "B", salary: 40000},
  {name: "C", salary: 15000},
  {name: "D", salary: 50000}
];

// Increase salary
let updated = employees.map(e => ({
  ...e,
  salary: e.salary * 1.1
}));
console.log("Salary Increased:", updated);

// Salary > 30000
console.log("Above 30000:", employees.filter(e => e.salary > 30000));

// Total salary
let totalSalary = employees.reduce((sum, e) => sum + e.salary, 0);
console.log("Total Salary:", totalSalary);

// Sort descending
let sorted = [...employees].sort((a, b) => b.salary - a.salary);
console.log("Sorted:", sorted);


// =======================
// 🚀 Task 4: String Ops
// =======================
let products = ["Laptop", "Mobile", "Tablet", "Camera"];

console.log("Has Mobile:", products.includes("Mobile"));

let lower = products.map(p => p.toLowerCase());
console.log("Lowercase:", lower);

console.log("Index of Tablet:", products.indexOf("Tablet"));

console.log("Joined:", products.join("-"));


// =======================
// 🚀 Task 5: Age
// =======================
let dob = new Date("2003-01-01");
let today = new Date();

let age = today.getFullYear() - dob.getFullYear();
let m = today.getMonth() - dob.getMonth();

if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
  age--;
}

console.log("You are", age, "years old");


// =======================
// 🚀 Task 6: Login
// =======================
let users = [
  {username: "admin", password: "1234"},
  {username: "user", password: "abcd"}
];

let inputUser = "admin";
let inputPass = "1234";

let user = users.find(u => u.username === inputUser && u.password === inputPass);

if (user) {
  console.log("Login Success ✅");
} else {
  console.log("Invalid Credentials ❌");
}


// =======================
// 🚀 Task 7: Numbers
// =======================
let numbers = [10, 15, 20, 25, 30];

console.log("Even Numbers:", numbers.filter(n => n % 2 === 0));

console.log("Any Odd:", numbers.some(n => n % 2 !== 0));

console.log("All Even:", numbers.every(n => n % 2 === 0));

console.log("First > 20:", numbers.find(n => n > 20));


// =======================
// 🎯 Bonus Task
// =======================
let orders = [
  {id: 1, amount: 500, status: "delivered"},
  {id: 2, amount: 1500, status: "pending"},
  {id: 3, amount: 2000, status: "delivered"}
];

// Total delivered revenue
let revenue = orders
  .filter(o => o.status === "delivered")
  .reduce((sum, o) => sum + o.amount, 0);

console.log("Delivered Revenue:", revenue);

// Pending orders
console.log("Pending Orders:", orders.filter(o => o.status === "pending"));

// Any order > 1000
console.log("Any >1000:", orders.some(o => o.amount > 1000));

// Sort ascending
let asc = [...orders].sort((a, b) => a.amount - b.amount);
console.log("Sorted Orders:", asc);

</script>

</body>
</html>
