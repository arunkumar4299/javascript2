<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Tasks - Single Page</title>
</head>
<body>

<h2>JavaScript Tasks Output (Check Console)</h2>

<script>
// 🔹 Task 1: E-Commerce Discount System
function calculateDiscount(product, price) {
  let finalPrice;
  if (price > 1000) {
    finalPrice = price * 0.8;
  } else {
    finalPrice = price * 0.9;
  }
  console.log("Product:", product);
  console.log("Final Price:", finalPrice);
}
calculateDiscount("Shoes", 2000);


// 🔹 Task 2: Order Processing using Callback
function payment(amount, callback) {
  console.log("Payment of " + amount + " successful");
  callback();
}

function orderSuccess() {
  console.log("Order delivered");
}

function placeOrder(callback) {
  console.log("Order placed");
  payment(500, callback);
}
placeOrder(orderSuccess);


// 🔹 Task 3: Employee Data Loop System
let employees = [
  {name:"Navi", salary:50000},
  {name:"John", salary:70000}
];

for (let emp of employees) {
  if (emp.salary > 60000) {
    console.log(emp.name + ": High Salary");
  } else {
    console.log(emp.name + ": Normal Salary");
  }
}


// 🔹 Task 4: Login Attempts (While Loop)
let attempt = 1;
let correctPassword = "1234";
let enteredPassword;

while (attempt <= 3) {
  console.log("Attempt", attempt);
  if (attempt === 3) {
    enteredPassword = "1234"; // simulate correct login
  } else {
    enteredPassword = "wrong";
  }

  if (enteredPassword === correctPassword) {
    console.log("Login success");
    break;
  }
  attempt++;
}


// 🔹 Task 5: Coupon Generator (Generator Function)
function* offers() {
  yield "10% OFF";
  yield "20% OFF";
  yield "Free Delivery";
  yield "Cashback";
}
let offerGen = offers();
console.log(offerGen.next().value);
console.log(offerGen.next().value);
console.log(offerGen.next().value);


// 🔹 Task 6: Shopping Cart Total (for...of)
let cart = [100, 200, 300, 400];
let total = 0;
for (let price of cart) {
  total += price;
}
console.log("Total Bill:", total);


// 🔹 Task 7: User Profile System (for...in)
let user = {
  name: "Navi",
  role: "Developer",
  location: "India"
};

for (let key in user) {
  console.log(key + " : " + user[key]);
}


// 🔹 Task 8: Factory Pattern
function createPhone() {
  return "Phone";
}
function createBattery() {
  return "Battery";
}
function createCharger() {
  return "Charger";
}

console.log("Your Order:", createPhone(), "+", createBattery(), "+", createCharger());


// 🔹 Task 9: College Form with Default Values
function collegeForm(name, dept = "Not Assigned") {
  console.log("Name:", name);
  console.log("Department:", dept);
}
collegeForm("Arun");


// 🔹 Task 10: Currying - EMI Calculator
function emi(p) {
  return function(r) {
    return function(t) {
      return (p * r * t) / 100;
    };
  };
}
console.log("EMI:", emi(10000)(2)(12));


// 🔹 Task 11: Even/Odd Analyzer
for (let i = 1; i <= 10; i++) {
  if (i % 2 === 0) {
    console.log(i, "Even");
  } else {
    console.log(i, "Odd");
  }
}


// 🔹 Task 12: Function Scope Debugging
if (true) {
  var a = 10;
  let b = 20;
  const c = 30;
}
console.log("var works:", a); 
// console.log(b); ❌ Error
// console.log(c); ❌ Error


// 🔹 Task 13: Real-Time Alert System (IIFE)
(function() {
  console.log("🔥 Flash Sale: 50% OFF on Shirts");
})();


// 🔹 Task 14: Marks Calculator
function marks(a, b, c) {
  let total = a + b + c;
  let avg = total / 3;
  return { total, avg };
}
let result = marks(80, 90, 70);
console.log("Total:", result.total);
console.log("Average:", result.avg);


// 🔹 Task 15: Retry Offer System
function* retryOffers() {
  yield "10% OFF";
  yield "20% OFF";
}

let retry = retryOffers();
console.log(retry.next());
console.log(retry.next());
console.log(retry.next().done ? "All offers expired" : "");

</script>

</body>
</html>
